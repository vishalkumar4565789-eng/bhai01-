<!DOCTYPE html>

<head>

    <title>NAVJOT TRADER (SEBI REGISTERED)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f12;
            background-image: radial-gradient(circle at top, rgba(34, 197, 94, 0.15) 0%, transparent 60%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(18, 26, 33, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Profile Section */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #22c55e;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #22c55e;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* Highlight List */
        .highlights {
            list-style: none;
            margin-bottom: 25px;
        }

        .highlights li {
            font-size: 14px;
            color: #b3b9c1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Main CTA Button */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: #22c55e;
            color: #0b0f12;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.6);
            background: #16a34a;
        }

        /* Features Checklist */
        .features {
            text-align: left;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 15px;
            color: #e2e8f0;
            font-weight: 500;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .check-icon {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.15);
            padding: 4px;
            border-radius: 6px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(34, 197, 94, 0.1);
            padding: 12px 5px;
            border-radius: 12px;
            transition: border-color 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(34, 197, 94, 0.4);
        }

        .stat-number {
            font-size: 18px;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Footer Element */
        .footer-shape {
            display: inline-block;
            width: 80px;
            height: 14px;
            border: 2px solid rgba(34, 197, 94, 0.5);
            border-radius: 10px;
            opacity: 0.7;
        }
    </style>
</head>
